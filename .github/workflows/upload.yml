Now let me break down what you need to do:

Key Changes Made
Fixed the altool upload command: The original command was missing --authenticationAltToolTokenFile, which tells altool where the API private key lives.
Proper keychain setup: The certificate/provisioning profile steps stay the same—those are correct.
Before You Run This
You need four secrets in your GitHub repo:

1. CERTIFICATE_BASE64
Export your Apple Distribution certificate as .p12
Run: cat cert.p12 | base64 | pbcopy
Add to GitHub Secrets
2. CERTIFICATE_PASSWORD
The password you set when exporting the .p12
3. APP_STORE_CONNECT_API_KEY_ID
From App Store Connect → Users & Access → Integrations → Keys
It looks like ABC123DEF456 (the Key ID)
4. APP_STORE_CONNECT_API_KEY_BASE64
Download the .p8 private key file from App Store Connect
Run: cat AuthKey_ABC123DEF456.p8 | base64 | pbcopy
Add to GitHub Secrets
5. APP_STORE_CONNECT_API_ISSUER_ID
Also from the Integrations page (the Issuer ID field)
Looks like 12345678-1234-1234-1234-123456789012
6. PROVISIONING_PROFILE_BASE64
Export your App Store provisioning profile
Run: cat profile.mobileprovision | base64 | pbcopy
To Run It
Push this .yml to .github/workflows/ in your repo
Go to GitHub → Actions → Select "Upload to App Store"
Click Run workflow
It will build, sign, export, and upload to App Store Connect
The build will appear as a new TestFlight build automatically. Then you just increment the version/build number in Xcode before running this, and it'll upload that version.

One quick note: Make sure your version and build number in Info.plist or build settings are higher than 1.0—App Store Connect will reject it otherwise.


