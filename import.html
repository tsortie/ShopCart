<!DOCTYPE html>
<html>
<head>
    <title>Opening ShopCart...</title>
    <script>
        async function redirect() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get("id");
            console.log("ID:", id);
            
            if (id) {
                const response = await fetch("https://jsonblob.com/api/jsonBlob/" + id);
                console.log("Status:", response.status);
                const json = await response.text();
                console.log("JSON:", json.substring(0, 100));
                const encoded = btoa(unescape(encodeURIComponent(json)));
                const name = JSON.parse(json).name || "";
                const deepLink = "shopcart://import?name=" + encodeURIComponent(name) + "&data=" + encoded;
                console.log("Deep link:", deepLink.substring(0, 100));
                window.location.href = deepLink;
            } else {
                document.body.innerHTML += "<p>No ID found in URL</p>";
            }
        }
        redirect();
    </script>
</head>
<body>
    <p>Opening ShopCart...</p>
</body>
</html>
