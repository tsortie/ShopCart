<!DOCTYPE html>
<html>
<head>
    <title>Opening ShopCart...</title>
    <script>
        async function redirect() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get("id");
            
            if (id) {
                const response = await fetch("https://jsonblob.com/api/jsonBlob/" + id);
                const json = await response.text();
                const encoded = btoa(json);
                const name = JSON.parse(json).name || "";
                window.location.href = "shopcart://import?name=" + encodeURIComponent(name) + "&data=" + encoded;
            }
        }
        redirect();
    </script>
</head>
<body>
    <p>Opening ShopCart...</p>
</body>
</html>
