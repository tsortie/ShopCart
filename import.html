<!DOCTYPE html>
<html>
<head>
    <title>Opening ShopCart...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #f2f2f7;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 32px 24px;
            text-align: center;
            max-width: 300px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.08);
        }
        h2 { margin: 0 0 8px; font-size: 20px; }
        p { color: #6e6e73; font-size: 15px; margin: 0 0 24px; }
        #openBtn {
            display: inline-block;
            background: #34C759;
            color: white;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
        }
        #openBtn.loading { background: #aeaeb2; }
    </style>
</head>
<body>
    <div class="card">
        <h2>ShopCart</h2>
        <p id="listName">Loading list...</p>
        <a id="openBtn" class="loading" href="#">Loading...</a>
    </div>
<script>
    const params = new URLSearchParams(window.location.search);
    const z = params.get("z");

    async function buildLink() {
        if (!z) {
            document.getElementById("listName").textContent = "Invalid link";
            return;
        }
        try {
            // Convert base64url back to standard base64
            let base64 = z.replace(/-/g, '+').replace(/_/g, '/');
            const remainder = base64.length % 4;
            if (remainder > 0) base64 += '='.repeat(4 - remainder);

            // Decode base64 to bytes
            const binary = atob(base64);
            const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));

            // Decompress using DecompressionStream (deflate-raw for zlib)
            const stream = new DecompressionStream('deflate-raw');
            const writer = stream.writable.getWriter();
            writer.write(bytes);
            writer.close();
            const reader = stream.readable.getReader();
            const chunks = [];
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                chunks.push(value);
            }
            const json = new TextDecoder().decode(
                new Uint8Array(chunks.reduce((a, b) => [...a, ...b], []))
            );

            const parsed = JSON.parse(json);
            const name = parsed.name || "a list";
            const encoded = btoa(unescape(encodeURIComponent(json)));
            const deepLink = "shopcart://import?name=" + encodeURIComponent(name) + "&data=" + encoded;

            const btn = document.getElementById("openBtn");
            btn.href = deepLink;
            btn.textContent = "Open in ShopCart";
            btn.classList.remove("loading");
            document.getElementById("listName").textContent = "\"" + name + "\"";
        } catch (e) {
            console.error(e);
            document.getElementById("listName").textContent = "Failed to load list";
            document.getElementById("openBtn").textContent = "Error";
        }
    }
    buildLink();
</script>
