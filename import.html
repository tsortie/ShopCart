<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopCart — Import List</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1c1c1e;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 360px;
      width: 90%;
      text-align: center;
    }
    .icon { font-size: 64px; margin-bottom: 20px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .list-name {
      font-size: 20px;
      font-weight: 600;
      color: #3B7A57;
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      color: #aeaeb2;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .btn {
      display: block;
      background: #3B7A57;
      color: #fff;
      text-decoration: none;
      font-size: 17px;
      font-weight: 600;
      padding: 16px 24px;
      border-radius: 14px;
      margin-bottom: 12px;
    }
    .btn:active { opacity: 0.8; }
    .sub { font-size: 13px; color: #636366; }
    .error { color: #ff453a; font-size: 15px; margin-bottom: 16px; }
    .loading { color: #aeaeb2; font-size: 15px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🛒</div>
    <h1>ShopCart</h1>
    <div class="list-name" id="listName">Loading...</div>
    <p>Someone shared a shopping list with you. Tap below to open it in ShopCart.</p>
    <div class="loading" id="loadingMsg">Fetching list data...</div>
    <div class="error" id="errorMsg" style="display:none">Unable to load list. The link may have expired.</div>
    <a class="btn" id="importBtn" href="#" style="display:none">Import List</a>
    <p class="sub">Requires ShopCart to be installed</p>
  </div>

 <script>
    const params = new URLSearchParams(window.location.search);
    const gistID = params.get("gist");

    if (!gistID) {
        document.getElementById("loadingMsg").style.display = "none";
        document.getElementById("errorMsg").style.display = "block";
        document.getElementById("listName").textContent = "Invalid Link";
    } else {
        fetch("https://api.github.com/gists/" + gistID)
            .then(function(r) { return r.json(); })
            .then(function(gist) {
                if (!gist.files || !gist.files["list.json"]) {
                    throw new Error("No list data found");
                }
                const content = gist.files["list.json"].content;
                const parsed = JSON.parse(content);

                if (parsed.name) {
                    document.getElementById("listName").textContent = parsed.name;
                }

                // Encode correctly for Swift's Data(base64Encoded:)
                const bytes = new TextEncoder().encode(content);
                let binary = '';
                bytes.forEach(function(byte) { binary += String.fromCharCode(byte); });
                const encoded = btoa(binary);

                const deepLink = "shopcart://import?data=" + encodeURIComponent(encoded);
                document.getElementById("importBtn").href = deepLink;
                document.getElementById("importBtn").style.display = "block";
                document.getElementById("loadingMsg").style.display = "none";
            })
            .catch(function(err) {
                console.error(err);
                document.getElementById("loadingMsg").style.display = "none";
                document.getElementById("errorMsg").style.display = "block";
                document.getElementById("listName").textContent = "Error";
            });
    }
</script>
</body>
</html>
