<!DOCTYPE html>
<html>
<head>
    <title>Opening ShopCart...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #f2f2f7;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 32px 24px;
            text-align: center;
            max-width: 300px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.08);
        }
        h2 { margin: 0 0 8px; font-size: 20px; }
        p { color: #6e6e73; font-size: 15px; margin: 0 0 24px; }
        a {
            display: inline-block;
            background: #34C759;
            color: white;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>ShopCart</h2>
        <p id="listName">You've been sent a list</p>
        <a id="openBtn" href="#">Open in ShopCart</a>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        async function buildLink() {
            if (!id) return;
            const response = await fetch("https://jsonblob.com/api/jsonBlob/" + id);
            const json = await response.text();
            const parsed = JSON.parse(json);
            const encoded = btoa(unescape(encodeURIComponent(json)));
            const name = parsed.name || "a list";
            document.getElementById("listName").textContent = "\"" + name + "\"";
            document.getElementById("openBtn").href = "shopcart://import?name=" + encodeURIComponent(name) + "&data=" + encoded;
        }
        buildLink();
    </script>
</body>
</html>
